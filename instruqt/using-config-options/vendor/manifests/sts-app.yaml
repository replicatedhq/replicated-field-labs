apiVersion: apps/v1
kind: Deployment
metadata:
  name: sts-app
  labels:
    app: sts-app
spec:
  replicas: 1
  selector:
    matchLabels:
      app: sts-app
  template:
    metadata:
      labels:
        app: sts-app
    spec:
      containers:
        - name: repl-db-consumer
          image: cremerfc/repl-db-consumer:latest
          ports:
            - containerPort: 5000
          env:
          # Define the environment variable
            - name: POSTGRES_HOST
              value: "sts-service"
            - name: POSTGRES_USER
              value: "postgres"
            - name: POSTGRES_DB
              value: "postgres"
            - name: POSTGRES_PASSWORD
              value: "postgres"
            - name: POSTGRES_PORT
              value: '5432'
          