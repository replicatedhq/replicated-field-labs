apiVersion: v1
kind: Service
metadata:
  name: repl-db-provider-service
  labels:
    app: repl-db-provider-service
  annotations:
    kots.io/when: '{{repl ConfigOptionEquals "postgres_type" "embedded_postgres"}}'
spec:
  type: ClusterIP
  ports:
  - name: postgresql
    port: 5432
    protocol: TCP
  selector:
    app: repl-db-provider
